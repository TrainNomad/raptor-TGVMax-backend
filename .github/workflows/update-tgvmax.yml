name: Update TGVmax Data

permissions:
  contents: write

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  update-tgvmax:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Récupération du code ──────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Configuration Node.js ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      # ── 3. Téléchargement de stations.csv (pour les coordonnées GPS) ─────────
      - name: Download stations.csv
        run: |
          curl -fsSL "https://raw.githubusercontent.com/trainline-eu/stations/master/stations.csv" -o stations.csv
          echo "✅ stations.csv prêt"

      # ── 4. Ingestion + construction de l'index des gares ─────────────────────
      # npm run build = tgvmax-ingest.js PUIS build-stations-index.js
      - name: Run Build (ingest + stations index)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # ── 5. Vérification des fichiers critiques ────────────────────────────────
      - name: Verify outputs
        run: |
          echo "=== Contenu de engine_data/ ==="
          ls -lh engine_data/
          for f in trips.json stops.json calendar_index.json meta.json; do
            if [ ! -f "engine_data/$f" ]; then
              echo "❌ Fichier critique manquant : engine_data/$f"
              exit 1
            fi
          done
          if [ ! -f "stations.json" ]; then
            echo "❌ stations.json manquant à la racine"
            exit 1
          fi
          echo "✅ Tous les fichiers nécessaires sont présents"

      # ── 6. Configuration Git ─────────────────────────────────────────────────
      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 7. Push sur la branche deploy ────────────────────────────────────────
      - name: Push to deploy branch
        run: |
          git fetch origin deploy 2>/dev/null || true
          git checkout -B deploy origin/deploy 2>/dev/null || git checkout -B deploy

          # Fusionner main pour avoir le dernier code du serveur
          git merge origin/main --no-edit --strategy-option=ours

          # Fichiers engine_data/ (trips, stops, routes, calendar, meta)
          git add -f engine_data/*.json
          # stations.json à la racine (utilisé par server.js pour l'autocomplétion)
          git add -f stations.json
          # stations.csv (utilisé par build-stations-index.js)
          git add stations.csv

          if git diff --staged --quiet; then
            echo "ℹ️ Aucun changement détecté"
          else
            git commit -m "chore: update tgvmax data $(date -u +'%Y-%m-%d %H:%M')"
            git push origin deploy --force
            echo "✅ Données poussées avec succès"
          fi