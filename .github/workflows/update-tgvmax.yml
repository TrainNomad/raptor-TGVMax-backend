name: Update TGVmax Data

permissions:
  contents: write

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  update-tgvmax:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      # On utilise tgvmax-ingest.js car server.js attend trips.json et stops.json
      - name: Run Ingestion
        run: node tgvmax-ingest.js
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # Vérification que les fichiers attendus par server.js sont là
      - name: Check generated files
        run: |
          ls -lh engine_data/
          test -f engine_data/trips.json || exit 1
          test -f engine_data/stops.json || exit 1
          test -f engine_data/meta.json || exit 1
          echo "✅ Fichiers critiques générés avec succès"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to deploy branch
        run: |
          git fetch origin deploy 2>/dev/null || true
          git checkout -B deploy origin/deploy 2>/dev/null || git checkout -B deploy
          
          # On fusionne main pour garder le code à jour
          git merge origin/main --no-edit --strategy-option=ours

          # CRUCIAL : On ajoute TOUS les fichiers dont server.js a besoin
          git add -f engine_data/trips.json \
                 engine_data/stops.json \
                 engine_data/routes_by_stop.json \
                 engine_data/calendar_index.json \
                 engine_data/meta.json

          if git diff --staged --quiet; then
            echo "ℹ️ Aucun changement dans les données"
          else
            git commit -m "chore: update tgvmax data $(date -u +'%Y-%m-%d')"
            git push origin deploy --force
          fi